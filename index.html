<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>社内ナレッジAI</title>

<style>

body{
font-family:sans-serif;
background:#f6f7f9;
margin:0;
padding:40px;
text-align:center;
}

h1{
font-size:28px;
margin-bottom:10px;
}

.searchbox{
width:600px;
max-width:90%;
padding:14px;
font-size:18px;
border-radius:30px;
border:1px solid #ccc;
}

.buttons{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
border-radius:8px;
border:0;
background:#e9ecf1;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#dfe3ea;
}

.result{
margin-top:40px;
max-width:700px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-top:20px;
}

</style>
</head>

<body>

<h1>社内ナレッジAI</h1>

<input id="q" class="searchbox" placeholder="キーワード検索でも、AI質問でも使えます。">

<div class="buttons">
<button onclick="search()">検索</button>
<button onclick="askAI()">AIに質問</button>
</div>

<div class="result">

<div class="card">
<h3>AI回答</h3>
<div id="ai-result">ここに回答が表示されます</div>
</div>

<div class="card">
<h3>関連資料</h3>
<div id="links"></div>
</div>

</div>

<script>

let SEARCH_DATA=[]

fetch("/json/search-index.json")
.then(res=>res.json())
.then(data=>{
SEARCH_DATA=data
console.log("検索データ読み込み",data.length)
})

function normalize(text){

return String(text || "")
.normalize("NFKC")
.toLowerCase()
.replace(/[\u30a1-\u30f6]/g,function(ch){
return String.fromCharCode(ch.charCodeAt(0)-0x60)
})
.replace(/\s+/g,"")
.replace(/　/g,"")

}

function getMatchedItems(query){

const q=normalize(query)

return SEARCH_DATA.filter(item=>{

const t=normalize(item.title)
const x=normalize(item.text)

return t.includes(q) || x.includes(q)

})

}

function search(){

const q=document.getElementById("q").value

const items=getMatchedItems(q)

const box=document.getElementById("links")

box.innerHTML=""

if(items.length===0){

box.innerHTML="該当資料なし"
return

}

items.slice(0,10).forEach(item=>{

const a=document.createElement("a")

a.href=item.url
a.textContent=item.title+" (P"+item.page+")"
a.target="_blank"

box.appendChild(a)
box.appendChild(document.createElement("br"))

})

}

async function askAI(){

const q=document.getElementById("q").value

const items=getMatchedItems(q)

if(items.length===0){

document.getElementById("ai-result").innerText="該当する資料が見つかりませんでした。"
return

}

let context=""

items.slice(0,5).forEach(i=>{
context+=i.title+"\n"+i.text+"\n\n"
})

const res=await fetch("/functions/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
question:q,
context:context
})

})

const data=await res.json()

document.getElementById("ai-result").innerText=data.answer

}

</script>

</body>
</html>
