<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TECHNOP@L-NET 社内ナレッジ</title>
  <meta name="description" content="社内PDF・規定・安全資料を検索できる社内ナレッジAI">

  <style>
    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Yu Gothic", sans-serif;
      background: #ffffff;
      color: #202124;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      padding: 20px;
      color: #5f6368;
      font-size: 14px;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 160px;
    }

    .logo {
      width: 400px;
      max-width: 80%;
    }

    .subtitle {
      margin-top: 15px;
      color: #5f6368;
    }

    /* ★カテゴリUI */
    .category-row {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .category-btn {
      border: 1px solid #dadce0;
      background: #fff;
      border-radius: 20px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .category-btn:hover {
      background: #f1f3f4;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 120px;
    }

    .bottom-area {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 15px;
    }

    .input-row {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    .query-input {
      flex: 1;
      height: 50px;
      border-radius: 25px;
      border: 1px solid #ccc;
      padding: 0 20px;
    }

    .btn {
      height: 50px;
      border-radius: 25px;
      border: none;
      padding: 0 20px;
      cursor: pointer;
    }

    .btn-search {
      background: #eee;
    }

    .btn-ai {
      background: #1a73e8;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topbar">社内検索</div>

    <section class="hero">
      <img src="./img/logo.png" class="logo">
      <div class="subtitle">社内PDF・規定・安全資料を検索 / AIで質問</div>

      <!-- ★カテゴリ -->
      <div class="category-row">
        <button class="category-btn">全て</button>
        <button class="category-btn">書類</button>
        <button class="category-btn">安全</button>
        <button class="category-btn">規定</button>
      </div>
    </section>

    <main class="content">
      <div id="conversation"></div>
    </main>

    <div class="bottom-area">
      <div class="input-row">
        <input class="query-input" placeholder="キーワードを入力">
        <button class="btn btn-search">検索</button>
        <button class="btn btn-ai">AIに質問</button>
      </div>
    </div>

  </div>

  <script src="./chat.js"></script>
</body>
</html>
