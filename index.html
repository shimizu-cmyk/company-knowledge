<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TECHNOP@L-NET 社内ナレッジ</title>
  <meta name="description" content="社内PDF・規定・安全資料を検索できる社内ナレッジAI">

  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #ffffff;
      color: #202124;
      min-height: 100vh;
    }

    a { color: inherit; }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 0;
    }

    .page.with-chatbar {
      padding-bottom: 92px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px;
      font-size: 13px;
      color: #5f6368;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 40px;
      transition: all 0.25s ease;
    }

    .hero.compact {
      display: block;
      padding: 12px 16px 10px;
      border-bottom: 1px solid #f1f3f4;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 40;
    }

    .hero-inner {
      width: 100%;
      max-width: 860px;
      text-align: center;
      margin: 0 auto;
    }

    .hero.compact .hero-inner {
      max-width: 1100px;
      text-align: left;
    }

    .hero-top-row {
      display: block;
    }

    .hero.compact .hero-top-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .site-logo {
      display: block;
      max-width: 100%;
      width: 520px;
      height: auto;
      margin: 0 auto 18px;
      transition: all 0.25s ease;
    }

    .hero.compact .site-logo {
      width: 170px;
      margin: 0;
      flex: 0 0 auto;
    }

    .subtext {
      font-size: 15px;
      color: #5f6368;
      margin: 0 0 28px;
      line-height: 1.8;
    }

    .hero.compact .subtext {
      display: none;
    }

    .search-shell {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .hero.compact .search-shell {
      display: none;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      border: 1px solid #dfe1e5;
      border-radius: 31px;
      padding: 0 18px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(32,33,36,.08);
    }

    .search-box:hover,
    .search-box:focus-within {
      box-shadow: 0 2px 10px rgba(32,33,36,.16);
      border-color: rgba(223,225,229,0);
    }

    .search-icon {
      font-size: 18px;
      color: #9aa0a6;
      flex: 0 0 auto;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      color: #202124;
      background: transparent;
      min-width: 0;
    }

    .search-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .action-btn {
      min-width: 128px;
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      color: #3c4043;
      font-size: 14px;
      padding: 11px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    .action-btn:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    .status-note {
      margin-top: 18px;
      font-size: 13px;
      color: #5f6368;
    }

    .hero.compact .status-note {
      display: none;
    }

    .category-toggle-wrap {
      margin-top: 20px;
    }

    .hero.compact .category-toggle-wrap {
      display: none;
    }

    .category-panel {
      display: none;
      margin-top: 18px;
    }

    .category-panel.active {
      display: block;
    }

    .quick-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 999px;
      background: #f1f3f4;
      color: #3c4043;
      font-size: 13px;
      text-decoration: none;
    }

    .chip:hover {
      background: #e8eaed;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 16px;
    }

    .category-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      text-decoration: none;
      text-align: left;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .category-card:hover {
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .category-card h3 {
      margin: 0 0 8px;
      font-size: 17px;
      color: #1f2937;
    }

    .category-card p {
      margin: 0;
      font-size: 13px;
      color: #5f6368;
      line-height: 1.6;
    }

    .home-link {
      display: none;
      max-width: 760px;
      margin: 14px auto 0;
      padding: 0 16px;
      width: 100%;
      font-size: 14px;
    }

    .home-link.active {
      display: block;
    }

    .home-link button {
      border: none;
      background: none;
      color: #1a73e8;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
    }

    .home-link button:hover {
      text-decoration: underline;
    }

    .results-wrap {
      display: none;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 16px 30px;
    }

    .results-wrap.active {
      display: block;
    }

    .conversation-wrap {
      max-width: 760px;
      margin: 0 auto 18px;
    }

    .message-row {
      display: flex;
      margin-bottom: 16px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .user-bubble {
      max-width: min(78%, 620px);
      background: #1a73e8;
      color: #fff;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(26,115,232,.18);
    }

    .assistant-card {
      max-width: min(82%, 700px);
      background: #f8f9fa;
      color: #374151;
      padding: 14px 16px;
      border-radius: 18px 18px 18px 4px;
      font-size: 14px;
      line-height: 1.8;
      border: 1px solid #e5e7eb;
      word-break: break-word;
    }

    .assistant-label {
      font-size: 12px;
      font-weight: 700;
      color: #5f6368;
      margin-bottom: 6px;
    }

    .citation-box {
      margin-top: 10px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.7;
    }

    .citation-box strong {
      display: block;
      margin-bottom: 4px;
      color: #374151;
    }

    .citation-box a {
      color: #1a73e8;
      text-decoration: none;
    }

    .citation-box a:hover {
      text-decoration: underline;
    }

    .ref-toggle {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      color: #1a73e8;
      cursor: pointer;
      user-select: none;
    }

    .ref-box {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e5e7eb;
      font-size: 13px;
      line-height: 1.7;
    }

    .ref-box.active {
      display: block;
    }

    .results-header {
      max-width: 760px;
      margin: 0 auto 2px;
      font-size: 14px;
      color: #5f6368;
    }

    .results-list {
      max-width: 760px;
      margin: 0 auto;
    }

    .result-item {
      padding: 18px 0 20px;
      border-bottom: 1px solid #f1f3f4;
    }

    .result-path {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .result-title {
      display: inline-block;
      font-size: 22px;
      line-height: 1.3;
      color: #1a0dab;
      text-decoration: none;
      margin-bottom: 6px;
    }

    .result-title:hover {
      text-decoration: underline;
    }

    .result-meta {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .result-snippet {
      font-size: 14px;
      color: #4d5156;
      line-height: 1.7;
      white-space: normal;
      word-break: break-word;
    }

    .chatbar {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.96);
      border-top: 1px solid #e5e7eb;
      backdrop-filter: blur(8px);
      z-index: 60;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
    }

    .chatbar.active {
      display: block;
    }

    .chatbar-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chatbar-input {
      flex: 1;
      min-height: 46px;
      border: 1px solid #dfe1e5;
      border-radius: 23px;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }

    .chatbar-input:focus {
      box-shadow: 0 2px 8px rgba(32,33,36,.12);
      border-color: #c7d2fe;
    }

    .chatbar-actions {
      display: flex;
      gap: 8px;
    }

    .chatbar-search,
    .chatbar-ai {
      height: 44px;
      border-radius: 22px;
      cursor: pointer;
      font-size: 14px;
      padding: 0 16px;
      white-space: nowrap;
    }

    .chatbar-search {
      border: 1px solid #dfe1e5;
      background: #fff;
      color: #3c4043;
    }

    .chatbar-search:hover {
      background: #f8f9fa;
    }

    .chatbar-ai {
      border: none;
      background: #1a73e8;
      color: #fff;
    }

    .chatbar-ai:hover {
      background: #1765cc;
    }

    @media (max-width: 900px) {
      .category-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .site-logo { width: 300px; }
      .hero.compact .site-logo { width: 130px; }
      .result-title { font-size: 19px; }
      .category-grid { grid-template-columns: 1fr; }
      .user-bubble, .assistant-card { max-width: 88%; }
      .chatbar-inner { flex-wrap: wrap; }
      .chatbar-actions { width: 100%; }
      .chatbar-search, .chatbar-ai { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="page" id="pageRoot">
    <div class="topbar">
      <div>社内検索</div>
    </div>

    <section class="hero" id="heroSection">
      <div class="hero-inner">
        <div class="hero-top-row">
          <img src="img/logo.png" alt="TECHNOP@L-NET" class="site-logo">

          <div class="search-shell">
            <div class="subtext">
              社内PDF・規定・安全資料・業務資料を横断検索<br>
              キーワード検索でも、AI質問でも使えます。
            </div>

            <div class="search-box">
              <div class="search-icon">🔍</div>
              <input
                type="text"
                id="searchInput"
                placeholder="酒気帯び / 熱中症 / 就業規則 / 事故処分 / LED"
                autocomplete="off"
              >
            </div>

            <div class="search-actions">
              <button class="action-btn" onclick="searchDocs()">検索</button>
              <button class="action-btn" onclick="askAI()">AIに質問</button>
              <button class="action-btn" onclick="toggleCategories()" id="categoryToggleBtn">カテゴリを表示</button>
            </div>

            <div class="status-note" id="loadingNote">検索データを読み込み中です...</div>

            <div class="category-toggle-wrap">
              <div class="category-panel" id="categoryPanel">
                <div class="quick-links">
                  <a class="chip" href="pages/manual.html">工事マニュアル</a>
                  <a class="chip" href="pages/rules.html">社内規定</a>
                  <a class="chip" href="pages/safety.html">安全資料</a>
                  <a class="chip" href="pages/system.html">システム資料</a>
                  <a class="chip" href="pages/it.html">IT資料</a>
                  <a class="chip" href="pages/documents.html">業務資料</a>
                </div>

                <div class="category-grid">
                  <a class="category-card" href="pages/rules.html">
                    <h3>社内規定</h3>
                    <p>就業ルール、申請関係、社内ルールを確認</p>
                  </a>
                  <a class="category-card" href="pages/safety.html">
                    <h3>安全資料</h3>
                    <p>安全衛生、KY、事故防止、注意事項を確認</p>
                  </a>
                  <a class="category-card" href="pages/manual.html">
                    <h3>工事マニュアル</h3>
                    <p>IP・LED・TVなど現場マニュアルを確認</p>
                  </a>
                  <a class="category-card" href="pages/it.html">
                    <h3>IT・端末</h3>
                    <p>スマホ、システム、社内IT利用手順を確認</p>
                  </a>
                  <a class="category-card" href="pages/documents.html">
                    <h3>業務資料</h3>
                    <p>各種資料、提出書類、参考文書を確認</p>
                  </a>
                  <a class="category-card" href="pages/system.html">
                    <h3>システム資料</h3>
                    <p>運用フロー、社内システム、管理資料を確認</p>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="home-link" id="homeLink">
      <button onclick="goHome()">← トップに戻る</button>
    </div>

    <section class="results-wrap" id="resultsWrap">
      <div class="conversation-wrap" id="conversationWrap"></div>
      <div class="results-header" id="resultsHeader"></div>
      <div class="results-list" id="resultsBody"></div>
    </section>
  </div>

  <div class="chatbar" id="chatbar">
    <div class="chatbar-inner">
      <input
        type="text"
        id="chatInput"
        class="chatbar-input"
        placeholder="質問や検索語を入力..."
        autocomplete="off"
      >
      <div class="chatbar-actions">
        <button class="chatbar-search" onclick="searchDocsFromBottom()">検索</button>
        <button class="chatbar-ai" onclick="askAIFromBottom()">AIに質問</button>
      </div>
    </div>
  </div>

  <script>
    let searchIndex = [];
    const conversationHistory = [];

    async function loadSearchIndex() {
      try {
        const res = await fetch("json/search-index.json");
        if (!res.ok) throw new Error("search-index.json の読み込みに失敗しました");

        const data = await res.json();
        searchIndex = Array.isArray(data.records) ? data.records : [];

        document.getElementById("loadingNote").textContent =
          `検索データ読込完了：${searchIndex.length}件`;
      } catch (err) {
        console.error(err);
        document.getElementById("loadingNote").textContent =
          "検索データの読み込みに失敗しました";
      }
    }

    function toggleCategories() {
      const panel = document.getElementById("categoryPanel");
      const btn = document.getElementById("categoryToggleBtn");
      const isActive = panel.classList.contains("active");

      if (isActive) {
        panel.classList.remove("active");
        btn.textContent = "カテゴリを表示";
      } else {
        panel.classList.add("active");
        btn.textContent = "カテゴリを閉じる";
      }
    }

    function normalize(text) {
      return String(text || "")
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60))
        .replace(/\s+/g, "")
        .replace(/　/g, "");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildSearchTarget(item) {
      return normalize([
        item.title,
        item.file,
        item.path,
        item.location,
        item.text,
        item.type,
        item.sheet,
        item.row
      ].join(" "));
    }

    function makeSnippet(text, keyword) {
      const raw = String(text || "");
      if (!raw) return "";

      const q = String(keyword || "").trim();
      if (!q) {
        return raw.slice(0, 140) + (raw.length > 140 ? "..." : "");
      }

      const normalizedRaw = normalize(raw);
      const normalizedQ = normalize(q);
      const idx = normalizedRaw.indexOf(normalizedQ);

      if (idx === -1) {
        return raw.slice(0, 140) + (raw.length > 140 ? "..." : "");
      }

      const start = Math.max(0, idx - 50);
      const end = Math.min(raw.length, idx + q.length + 90);
      let snippet = raw.slice(start, end);

      if (start > 0) snippet = "..." + snippet;
      if (end < raw.length) snippet += "...";

      return snippet;
    }

    function scoreItem(item, input) {
      const q = normalize(input);
      const title = normalize(item.title);
      const location = normalize(item.location);
      const text = normalize(item.text);

      let score = 0;

      if (q && title.includes(q)) score += 120;
      if (q && location.includes(q)) score += 40;
      if (q && text.includes(q)) score += 20;

      const words = String(input || "")
        .split(/[\s　]+/)
        .map(w => normalize(w))
        .filter(Boolean);

      for (const w of words) {
        if (title.includes(w)) score += 35;
        if (location.includes(w)) score += 10;
        if (text.includes(w)) score += 6;
      }

      return score;
    }

    function showResultsLayout() {
      document.getElementById("heroSection").classList.add("compact");
      document.getElementById("resultsWrap").classList.add("active");
      document.getElementById("homeLink").classList.add("active");
      document.getElementById("chatbar").classList.add("active");
      document.getElementById("pageRoot").classList.add("with-chatbar");
    }

    function syncBottomInput(value) {
      document.getElementById("chatInput").value = value || "";
    }

    function syncTopInput(value) {
      document.getElementById("searchInput").value = value || "";
    }

    function goHome() {
      conversationHistory.length = 0;
      document.getElementById("heroSection").classList.remove("compact");
      document.getElementById("resultsWrap").classList.remove("active");
      document.getElementById("homeLink").classList.remove("active");
      document.getElementById("chatbar").classList.remove("active");
      document.getElementById("pageRoot").classList.remove("with-chatbar");
      document.getElementById("resultsHeader").innerHTML = "";
      document.getElementById("resultsBody").innerHTML = "";
      document.getElementById("conversationWrap").innerHTML = "";
      syncTopInput("");
      syncBottomInput("");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderConversation() {
      const wrap = document.getElementById("conversationWrap");

      wrap.innerHTML = conversationHistory.map((item, index) => {
        if (item.role === "user") {
          return `
            <div class="message-row user">
              <div class="user-bubble">${escapeHtml(item.content)}</div>
            </div>
          `;
        }

        if (item.role === "assistant") {
          const refsHtml = item.refs || "";
          const refCount = item.refCount || 0;
          const citationHtml = item.citationHtml || "";

          return `
            <div class="message-row assistant">
              <div class="assistant-card">
                <div class="assistant-label">AI回答</div>
                <div>${escapeHtml(item.content).replace(/\n/g, "<br>")}</div>
                ${citationHtml ? `<div class="citation-box">${citationHtml}</div>` : ""}
                ${refCount > 0 ? `
                  <div class="ref-toggle" onclick="toggleRefs(${index})">
                    参考資料 ${refCount}件を表示 / 非表示
                  </div>
                  <div class="ref-box" id="ref-box-${index}">
                    ${refsHtml}
                  </div>
                ` : ""}
              </div>
            </div>
          `;
        }

        return "";
      }).join("");
    }

    function toggleRefs(index) {
      const el = document.getElementById(`ref-box-${index}`);
      if (!el) return;
      el.classList.toggle("active");
    }

    function appendUserMessage(text) {
      conversationHistory.push({ role: "user", content: text });
      renderConversation();
    }

    function appendAssistantMessage(text, refsHtml, refCount, citationHtml) {
      conversationHistory.push({
        role: "assistant",
        content: text,
        refs: refsHtml || "",
        refCount: refCount || 0,
        citationHtml: citationHtml || ""
      });
      renderConversation();
    }

    function scrollToLatest() {
      setTimeout(() => {
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth"
        });
      }, 80);
    }

    function renderResults(matched, input) {
      const resultsBody = document.getElementById("resultsBody");
      const resultsHeader = document.getElementById("resultsHeader");

      resultsHeader.textContent = `${matched.length} 件の結果`;

      if (matched.length === 0) {
        resultsBody.innerHTML = `
          <div class="result-item">
            <div class="result-snippet">
              該当する資料が見つかりませんでした。<br>
              例：酒気帯び / 熱中症 / 就業規則 / 事故処分 / LED
            </div>
          </div>
        `;
        return;
      }

      resultsBody.innerHTML = matched.map(item => {
        const snippet = escapeHtml(makeSnippet(item.text, input));
        const pathText = escapeHtml(item.path || "");
        const titleText = escapeHtml(item.title || "");
        const fileText = escapeHtml(item.file || "");
        const locationText = escapeHtml(item.location || "");

        if (item.type === "pdf") {
          return `
            <div class="result-item">
              <div class="result-path">${pathText}</div>
              <a class="result-title" href="${item.url || "#"}" target="_blank" rel="noopener noreferrer">${titleText}</a>
              <div class="result-meta">PDF / ${locationText} / ${fileText}</div>
              <div class="result-snippet">${snippet}</div>
            </div>
          `;
        }

        return `
          <div class="result-item">
            <div class="result-path">${pathText}</div>
            <div class="result-title" style="color:#202124;cursor:default;text-decoration:none;">${titleText}</div>
            <div class="result-meta">Excel / ${locationText} / ${fileText}</div>
            <div class="result-snippet">${snippet}</div>
          </div>
        `;
      }).join("");
    }

    function getMatchedItems(input, limit = 30) {
      const q = normalize(input);

      const words = String(input || "")
        .split(/[\s　]+/)
        .map(w => normalize(w))
        .filter(Boolean);

      return searchIndex
        .map(item => {
          const target = buildSearchTarget(item);
          let matched = false;

          if (q && target.includes(q)) {
            matched = true;
          } else if (words.length > 0) {
            const hitCount = words.filter(w => target.includes(w)).length;
            matched = hitCount >= 1;
          }

          if (!matched) return null;

          return {
            ...item,
            _score: scoreItem(item, input)
          };
        })
        .filter(Boolean)
        .sort((a, b) => b._score - a._score)
        .slice(0, limit);
    }

    async function fetchAIAnswer(question, matched) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          question,
          sources: matched.map(item => ({
            title: item.title || "",
            page: item.page || "",
            location: item.location || "",
            url: item.url || "",
            text: item.text || ""
          }))
        })
      });

      const text = await response.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error("AI応答の形式が不正です");
      }

      if (!response.ok) {
        throw new Error(data.error || "AI回答の取得に失敗しました");
      }

      return {
        answer: data.answer || "回答を取得できませんでした。",
        citations: Array.isArray(data.citations) ? data.citations : []
      };
    }

    function getTopInputValue() {
      return document.getElementById("searchInput").value.trim();
    }

    function getBottomInputValue() {
      return document.getElementById("chatInput").value.trim();
    }

    function searchDocsFromBottom() {
      const value = getBottomInputValue();
      syncTopInput(value);
      searchDocs(value);
    }

    function askAIFromBottom() {
      const value = getBottomInputValue();
      syncTopInput(value);
      askAI(value);
    }

    function searchDocs(forcedInput) {
      const input = typeof forcedInput === "string" ? forcedInput.trim() : getTopInputValue();

      if (!input) {
        showResultsLayout();
        appendUserMessage("検索キーワードを入力してください");
        document.getElementById("resultsHeader").textContent = "";
        document.getElementById("resultsBody").innerHTML = `
          <div class="result-item">
            <div class="result-snippet">検索キーワードを入力してください。</div>
          </div>
        `;
        syncBottomInput("");
        scrollToLatest();
        return;
      }

      if (!Array.isArray(searchIndex) || searchIndex.length === 0) {
        showResultsLayout();
        appendUserMessage(input);
        document.getElementById("resultsHeader").textContent = "";
        document.getElementById("resultsBody").innerHTML = `
          <div class="result-item">
            <div class="result-snippet">
              検索データがまだ読み込まれていません。<br>
              search-index.json の生成や配置を確認してください。
            </div>
          </div>
        `;
        syncBottomInput(input);
        scrollToLatest();
        return;
      }

      const matched = getMatchedItems(input, 9999);
      showResultsLayout();
      appendUserMessage(input);
      renderResults(matched, input);
      syncBottomInput(input);
      scrollToLatest();
    }

    async function askAI(forcedInput) {
      const input = typeof forcedInput === "string" ? forcedInput.trim() : getTopInputValue();

      showResultsLayout();

      if (!input) {
        appendUserMessage("質問を入力してください");
        syncBottomInput("");
        document.getElementById("resultsHeader").textContent = "";
        document.getElementById("resultsBody").innerHTML = "";
        appendAssistantMessage("質問を入力してください。例：酒気帯びの確認方法は？", "", 0, "");
        scrollToLatest();
        return;
      }

      appendUserMessage(input);
      syncBottomInput(input);
      scrollToLatest();

      if (!Array.isArray(searchIndex) || searchIndex.length === 0) {
        document.getElementById("resultsHeader").textContent = "";
        document.getElementById("resultsBody").innerHTML = "";
        appendAssistantMessage("検索データがまだ読み込まれていません。先に search-index.json の生成・配置を確認してください。", "", 0, "");
        scrollToLatest();
        return;
      }

      const topMatched = getMatchedItems(input, 5);
      const allMatched = getMatchedItems(input, 9999);

      if (allMatched.length === 0) {
        document.getElementById("resultsHeader").textContent = "";
        document.getElementById("resultsBody").innerHTML = "";
        appendAssistantMessage("該当する資料が見つかりませんでした。\n別の言い方で検索してください。\n例：就業規則 / 熱中症 / 酒気帯び / 事故処分", "", 0, "");
        scrollToLatest();
        return;
      }

      const refs = allMatched.map(item => {
        if (item.type === "pdf") {
          return `・<a href="${item.url || "#"}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a>（${escapeHtml(item.location || "")}）`;
        }
        return `・${escapeHtml(item.title)}（${escapeHtml(item.location || "")}）`;
      }).join("<br>");

      document.getElementById("resultsHeader").textContent = "";
      document.getElementById("resultsBody").innerHTML = "";

      try {
        const result = await fetchAIAnswer(input, topMatched);

        let citationHtml = "";
        if (Array.isArray(result.citations) && result.citations.length > 0) {
          const citationLines = result.citations.map(c => {
            const idx = Number(c.index) - 1;
            const item = topMatched[idx];
            const page = c.page || (item ? item.page : "");
            if (!item) return "";
            const title = escapeHtml(item.title || "資料");
            const url = item.url || "#";
            return `・<a href="${url}" target="_blank" rel="noopener noreferrer">${title}</a>（P${escapeHtml(page)}）`;
          }).filter(Boolean);

          if (citationLines.length > 0) {
            citationHtml = `<strong>回答の根拠ページ</strong>${citationLines.join("<br>")}`;
          }
        }

        appendAssistantMessage(result.answer, refs, allMatched.length, citationHtml);
      } catch (error) {
        appendAssistantMessage(
          `AI回答の取得でエラーが発生しました。\n${error.message}\nただし、関連資料は見つかっています。`,
          refs,
          allMatched.length,
          ""
        );
      }

      scrollToLatest();
    }

    document.getElementById("searchInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") searchDocs();
    });

    document.getElementById("chatInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") askAIFromBottom();
    });

    loadSearchIndex();
  </script>
</body>
</html>
