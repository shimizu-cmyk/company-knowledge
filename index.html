<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TECHNOP@L-NET 社内ナレッジAI</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #fff;
      color: #202124;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero.compact {
      height: auto;
      padding: 20px;
      justify-content: flex-start;
    }

    .logo {
      width: 320px;
      margin-bottom: 20px;
      transition: .3s;
    }

    .hero.compact .logo {
      width: 180px;
    }

    .search-box {
      width: 500px;
      max-width: 90%;
      border: 1px solid #ddd;
      border-radius: 30px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
    }

    .actions {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 18px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    .primary {
      background: #1a73e8;
      color: #fff;
      border: none;
    }

    .bottom-bar {
      display: none;
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: #fff;
    }

    .hero.compact ~ .bottom-bar {
      display: block;
    }

    .input-wrap {
      max-width: 900px;
      margin: auto;
      display: flex;
      gap: 10px;
    }

    .conversation {
      padding: 20px;
    }
  </style>
</head>

<body>

<div id="hero" class="hero">

  <img src="./img/logo.png" class="logo">

  <div class="search-box">
    <input id="queryInput" class="search-input" placeholder="キーワードを入力">
  </div>

  <div class="actions">
    <button id="searchBtn">検索</button>
    <button id="askBtn" class="primary">AIに質問</button>
  </div>

</div>

<div id="conversation" class="conversation"></div>

<div class="bottom-bar">
  <div class="input-wrap">
    <input id="queryInputBottom" class="search-input">
    <button id="searchBtnBottom">検索</button>
    <button id="askBtnBottom" class="primary">AI</button>
  </div>
</div>

<script>
const hero = document.getElementById("hero");

const topInput = document.getElementById("queryInput");
const bottomInput = document.getElementById("queryInputBottom");

const searchBtn = document.getElementById("searchBtn");
const askBtn = document.getElementById("askBtn");

const searchBtnBottom = document.getElementById("searchBtnBottom");
const askBtnBottom = document.getElementById("askBtnBottom");

function goCompact() {
  hero.classList.add("compact");
}

function sync() {
  bottomInput.value = topInput.value;
}

searchBtn.onclick = () => {
  sync();
  goCompact();
};

askBtn.onclick = () => {
  sync();
  goCompact();
};

searchBtnBottom.onclick = () => {};
askBtnBottom.onclick = () => {};
</script>

<script src="./chat.js"></script>

</body>
</html>
