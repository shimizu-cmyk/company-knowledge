<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TECHNOP@L-NET 社内ナレッジAI</title>
  <meta name="description" content="社内PDF・規定・安全資料を検索できる社内ナレッジAI">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #ffffff;
      color: #202124;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px;
      color: #5f6368;
      font-size: 14px;
      flex-shrink: 0;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 32px;
      transition: all .25s ease;
    }

    .hero.compact {
      flex: 0 0 auto;
      justify-content: flex-start;
      padding: 14px 20px 110px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .logo {
      width: min(420px, 78vw);
      max-width: 420px;
      display: block;
      object-fit: contain;
      transition: width .25s ease;
    }

    .hero.compact .logo {
      width: 180px;
      max-width: 180px;
    }

    .hero-sub {
      margin-top: 18px;
      color: #5f6368;
      font-size: 16px;
      text-align: center;
    }

    .hero.compact .hero-sub {
      display: none;
    }

    .hero-search {
      width: 100%;
      max-width: 760px;
      margin-top: 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transition: all .25s ease;
    }

    .hero.compact .hero-search {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 12px 16px 18px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      border-top: 1px solid #e5e7eb;
      z-index: 50;
    }

    .search-input-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .query-input {
      width: 100%;
      height: 58px;
      border-radius: 999px;
      border: 1px solid #dadce0;
      background: #fff;
      padding: 0 24px;
      font-size: 18px;
      outline: none;
      transition: all .2s ease;
    }

    .query-input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.12);
    }

    .hero.compact .query-input {
      height: 50px;
      font-size: 16px;
      padding: 0 18px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid #dadce0;
      background: #fff;
      color: #202124;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover {
      background: #f8f9fa;
    }

    .btn-ai {
      background: #1a73e8;
      color: #fff;
      border: none;
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.22);
    }

    .btn-ai:hover {
      background: #1765cc;
    }

    .main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 120px;
    }

    .back-row {
      margin: 0 0 14px;
      display: none;
    }

    .back-row.show {
      display: block;
    }

    .back-btn {
      border: none;
      background: transparent;
      color: #1a73e8;
      font-size: 15px;
      cursor: pointer;
      padding: 0;
    }

    .conversation {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 120px;
    }

    .message {
      display: flex;
      width: 100%;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(820px, 92%);
      padding: 16px 18px;
      border-radius: 18px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 6px 22px rgba(15, 23, 42, 0.06);
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .message.assistant .bubble {
      background: #fff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 6px;
    }

    .bubble-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: #374151;
    }

    .refs {
      margin-top: 12px;
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
    }

    .refs-toggle {
      background: transparent;
      border: none;
      color: #1a73e8;
      padding: 0;
      cursor: pointer;
      font-size: 14px;
    }

    .refs-list {
      margin-top: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .refs-list.show {
      display: flex;
    }

    .ref-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .ref-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .ref-meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .ref-snippet {
      font-size: 14px;
      color: #374151;
      margin-bottom: 8px;
      line-height: 1.7;
    }

    .ref-link {
      color: #1a73e8;
      font-size: 14px;
      font-weight: 600;
    }

    .empty-note {
      color: #6b7280;
      font-size: 14px;
      text-align: center;
      padding: 10px 0 10px;
    }

    .status {
      width: 100%;
      max-width: 1100px;
      margin: 8px auto 0;
      color: #6b7280;
      font-size: 13px;
      min-height: 18px;
      padding: 0 4px;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 0 16px;
      }

      .hero {
        padding: 18px 16px 24px;
      }

      .hero.compact {
        padding: 12px 14px 104px;
      }

      .logo {
        width: min(320px, 82vw);
      }

      .hero.compact .logo {
        width: 150px;
      }

      .hero-search {
        margin-top: 20px;
        gap: 14px;
      }

      .hero.compact .hero-search {
        padding: 10px 12px 14px;
      }

      .query-input {
        height: 54px;
        font-size: 16px;
      }

      .hero.compact .query-input {
        height: 48px;
        font-size: 15px;
      }

      .btn {
        height: 48px;
        font-size: 15px;
        padding: 0 16px;
      }

      .main {
        padding: 0 14px 112px;
      }

      .bubble {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">社内検索</div>

    <section id="hero" class="hero">
      <div class="logo-wrap">
        <img class="logo" src="./img/logo.png" alt="TECHNOP@L-NET AI">
      </div>

      <div class="hero-sub">社内PDF・規定・安全資料を検索 / AIで質問</div>

      <div class="hero-search">
        <div class="search-input-wrap">
          <input
            id="queryInput"
            class="query-input"
            type="text"
            placeholder="キーワードを入力"
            autocomplete="off"
          >
        </div>

        <div class="hero-actions">
          <button id="categoryBtn" class="btn" type="button">カテゴリ表示</button>
          <button id="searchBtn" class="btn" type="button">検索</button>
          <button id="askBtn" class="btn btn-ai" type="button">AIに質問</button>
        </div>
      </div>
    </section>

    <main class="main">
      <div id="backRow" class="back-row">
        <button id="backBtn" class="back-btn" type="button">← トップに戻る</button>
      </div>

      <div id="conversation" class="conversation">
        <div id="emptyNote" class="empty-note">下の入力欄から検索またはAIに質問してください。</div>
      </div>

      <div id="status" class="status"></div>
    </main>
  </div>

  <script>
    const categoryBtn = document.getElementById("categoryBtn");
    categoryBtn.addEventListener("click", () => {
      alert("カテゴリ一覧は次でつける。今はまず画面と検索動作を正常化する段階。");
    });
  </script>

  <script src="./chat.js"></script>
</body>
</html>
