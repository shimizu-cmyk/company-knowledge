<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TECHNOP@L-NET 社内ナレッジAI</title>
  <meta name="description" content="社内PDF・規定・安全資料を検索できる社内ナレッジAI">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f8f9fb;
      color: #1f2937;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px;
      color: #6b7280;
      font-size: 14px;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 140px;
      transition: all .25s ease;
    }

    .hero.compact {
      flex: 0 0 auto;
      justify-content: flex-start;
      padding: 20px 20px 12px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .logo {
      width: min(420px, 78vw);
      max-width: 420px;
      display: block;
      object-fit: contain;
      transition: width .25s ease;
    }

    .hero.compact .logo {
      width: 220px;
      max-width: 220px;
    }

    .hero-sub {
      margin-top: 18px;
      color: #6b7280;
      font-size: 15px;
      text-align: center;
    }

    .hero.compact .hero-sub {
      display: none;
    }

    .main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 120px;
    }

    .back-row {
      margin: 0 0 14px;
      display: none;
    }

    .back-row.show {
      display: block;
    }

    .back-btn {
      border: none;
      background: transparent;
      color: #2563eb;
      font-size: 15px;
      cursor: pointer;
      padding: 0;
    }

    .conversation {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 160px;
    }

    .message {
      display: flex;
      width: 100%;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(820px, 92%);
      padding: 16px 18px;
      border-radius: 18px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 6px 22px rgba(15, 23, 42, 0.06);
    }

    .message.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .message.assistant .bubble {
      background: #fff;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 6px;
    }

    .bubble-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: #374151;
    }

    .refs {
      margin-top: 12px;
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
    }

    .refs-toggle {
      background: transparent;
      border: none;
      color: #2563eb;
      padding: 0;
      cursor: pointer;
      font-size: 14px;
    }

    .refs-list {
      margin-top: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .refs-list.show {
      display: flex;
    }

    .ref-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }

    .ref-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .ref-meta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .ref-snippet {
      font-size: 14px;
      color: #374151;
      margin-bottom: 8px;
      line-height: 1.7;
    }

    .ref-link {
      color: #2563eb;
      font-size: 14px;
      font-weight: 600;
    }

    .empty-note {
      color: #6b7280;
      font-size: 14px;
      text-align: center;
      padding: 26px 0 10px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(248, 249, 251, 0.95);
      backdrop-filter: blur(8px);
      border-top: 1px solid #e5e7eb;
      padding: 14px 16px 18px;
    }

    .input-wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .query-input {
      flex: 1;
      height: 56px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      padding: 0 22px;
      font-size: 18px;
      outline: none;
      background: #fff;
    }

    .query-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .btn {
      height: 56px;
      padding: 0 22px;
      border-radius: 999px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-search {
      background: #fff;
      color: #1f2937;
      border: 1px solid #d1d5db;
    }

    .btn-ai {
      background: #2563eb;
      color: #fff;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
    }

    .status {
      width: 100%;
      max-width: 1100px;
      margin: 8px auto 0;
      color: #6b7280;
      font-size: 13px;
      min-height: 18px;
      padding: 0 4px;
    }

    @media (max-width: 768px) {
      .topbar {
        height: 56px;
        padding: 0 16px;
      }

      .main {
        padding: 0 14px 120px;
      }

      .input-wrap {
        gap: 8px;
      }

      .query-input {
        font-size: 16px;
        height: 52px;
        padding: 0 18px;
      }

      .btn {
        height: 52px;
        font-size: 15px;
        padding: 0 16px;
      }

      .hero {
        padding: 18px 16px 120px;
      }

      .hero.compact .logo {
        width: 180px;
      }

      .bubble {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">社内検索</div>

    <section id="hero" class="hero">
      <div class="logo-wrap">
        <img class="logo" src="./img/logo.png" alt="TECHNOP@L-NET AI">
      </div>
      <div class="hero-sub">社内PDF・規定・安全資料を検索 / AIで質問</div>
    </section>

    <main class="main">
      <div id="backRow" class="back-row">
        <button id="backBtn" class="back-btn">← トップに戻る</button>
      </div>

      <div id="conversation" class="conversation">
        <div id="emptyNote" class="empty-note">下の入力欄から検索またはAIに質問してください。</div>
      </div>
    </main>

    <div class="bottom-bar">
      <div class="input-wrap">
        <input
          id="queryInput"
          class="query-input"
          type="text"
          placeholder="キーワードを入力"
          autocomplete="off"
        >
        <button id="searchBtn" class="btn btn-search">検索</button>
        <button id="askBtn" class="btn btn-ai">AIに質問</button>
      </div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="./chat.js"></script>
</body>
</html>
