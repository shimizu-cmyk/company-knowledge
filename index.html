<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TECHNOP@L-NET 社内ナレッジAI</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background:#fff;
  color:#202124;
}

/* ===== レイアウト ===== */
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== トップ ===== */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:.3s;
}

.hero.compact{
  flex:0;
  justify-content:flex-start;
  padding:20px;
}

/* ===== ロゴ ===== */
.logo{
  width:320px;
  margin-bottom:20px;
  transition:.3s;
}

.hero.compact .logo{
  width:160px;
}

/* ===== 検索エリア ===== */
.search-area{
  width:100%;
  max-width:700px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

/* ===== 検索窓 ===== */
.query-input{
  width:100%;
  height:60px;
  border-radius:30px;
  border:1px solid #ddd;
  padding:0 25px;
  font-size:22px;
}

/* ===== 下バー（修正版） ===== */
.hero.compact .search-area{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  max-width:900px;
  margin:auto;

  padding:12px;
  background:#fff;
  border-top:1px solid #ddd;
}

.hero.compact .query-input{
  height:50px;
  font-size:16px;
}

/* ===== ボタン ===== */
.actions{
  display:flex;
  gap:10px;
}

button{
  padding:10px 18px;
  border-radius:20px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

.primary{
  background:#1a73e8;
  color:#fff;
  border:none;
}

/* ===== 会話 ===== */
.main{
  padding:20px;
}

.message{
  margin:10px 0;
}

.user{
  text-align:right;
}

.bubble{
  display:inline-block;
  padding:12px;
  border-radius:10px;
}

.user .bubble{
  background:#1a73e8;
  color:#fff;
}

.ai .bubble{
  background:#f1f3f4;
}
</style>
</head>

<body>

<div class="app">

  <div id="hero" class="hero">

    <img src="./img/logo.png" class="logo">

    <div class="search-area">

      <input id="queryInput" class="query-input" placeholder="キーワードを入力">

      <div class="actions">
        <button id="categoryBtn">カテゴリ表示</button>
        <button id="searchBtn">検索</button>
        <button id="askBtn" class="primary">AIに質問</button>
      </div>

    </div>
  </div>

  <div id="conversation" class="main"></div>

</div>

<!-- カテゴリ（簡易） -->
<script>
document.getElementById("categoryBtn").onclick = () => {
  alert("カテゴリ表示（後で本実装）");
};
</script>

<!-- UI制御だけ -->
<script>
const hero = document.getElementById("hero");

document.getElementById("searchBtn").addEventListener("click", () => {
  hero.classList.add("compact");
});

document.getElementById("askBtn").addEventListener("click", () => {
  hero.classList.add("compact");
});
</script>

<!-- 本体ロジック -->
<script src="./chat.js"></script>

</body>
</html>
